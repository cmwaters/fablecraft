name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14

    env:
      RELEASE_ASSET_NAME: Fablecraft-macos-arm64.dmg
      UPDATE_ASSET_NAME: Fablecraft-macos-arm64.app.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build macOS bundles (DMG + app archive for updater)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles dmg,app

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

      - name: Stage release assets and generate update manifest
        run: |
          mkdir -p release-assets

          # Stage DMG
          mv src-tauri/target/release/bundle/dmg/*.dmg "release-assets/${RELEASE_ASSET_NAME}"

          # Stage updater archive and signature
          APP_TAR=$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz)
          SIG_FILE="${APP_TAR}.sig"
          cp "$APP_TAR" "release-assets/${UPDATE_ASSET_NAME}"
          cp "$SIG_FILE" "release-assets/${UPDATE_ASSET_NAME}.sig"

          # Generate latest.json update manifest
          VERSION="${GITHUB_REF_NAME#v}"
          SIG=$(cat "$SIG_FILE")
          REPO="https://github.com/fablecraft-org/fablecraft"
          cat > release-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "${REPO}/releases/download/${GITHUB_REF_NAME}/${UPDATE_ASSET_NAME}",
                "signature": "${SIG}"
              }
            }
          }
          EOF

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/${{ env.RELEASE_ASSET_NAME }}
            release-assets/${{ env.UPDATE_ASSET_NAME }}
            release-assets/${{ env.UPDATE_ASSET_NAME }}.sig
            release-assets/latest.json
          generate_release_notes: true
