name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-macos:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Type-check and build frontend
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build app (no bundling)
        run: npm run tauri build -- --no-bundle

  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Type-check and build frontend
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build app (no bundling)
        run: npm run tauri build -- --no-bundle
